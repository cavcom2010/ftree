<!-- templates/core/_bottom_nav.html -->
<div class="bottom-nav-wrapper">
  <nav class="bottom-nav" id="bottomNav" role="navigation" aria-label="Main navigation">
    {% if request.user.is_authenticated %}
      <a href="/tree/" data-bottom-tree-link {% if request.path == '/tree/' or request.path == '/tree' %}class="active" aria-current="page"{% endif %}>
        <i data-lucide="tree-deciduous"></i>Tree
      </a>
      <a href="/memories/" {% if request.path == '/memories/' %}class="active" aria-current="page"{% endif %}>
        <i data-lucide="image"></i>Memory
      </a>
      {% if request.path == '/tree/' or request.path == '/tree' %}
        <button class="add-main" type="button" data-tree-open-anchor aria-label="Open your person card to connect relatives">
          <i data-lucide="plus"></i>Connect
        </button>
      {% else %}
        <a class="add-main" href="/tree/" aria-label="Connect relatives">
          <i data-lucide="plus"></i>Connect
        </a>
      {% endif %}
      <a href="{% url 'home' %}" {% if request.path == '/' %}class="active" aria-current="page"{% endif %}>
        <i data-lucide="home"></i>Home
      </a>
      <a href="/stories/" {% if request.path == '/stories/' %}class="active" aria-current="page"{% endif %}>
        <i data-lucide="menu"></i>Menu
      </a>
    {% else %}
      <a href="/" {% if request.path == '/' %}class="active" aria-current="page"{% endif %}>
        <i data-lucide="home"></i>Home
      </a>
      <a href="/tree/" data-bottom-tree-link {% if request.path == '/tree/' or request.path == '/tree' %}class="active" aria-current="page"{% endif %}>
        <i data-lucide="tree-deciduous"></i>Tree
      </a>
      <a
        href="{% url 'login' %}"
        class="add-main{% if request.path == '/accounts/login/' or request.path == '/accounts/signup/' %} active{% endif %}"
        data-nav-match="/accounts/login/ /accounts/signup/"
        aria-label="Account"
        {% if request.path == '/accounts/login/' or request.path == '/accounts/signup/' %}aria-current="page"{% endif %}>
        <i data-lucide="circle-user-round"></i>Account
      </a>
      <a href="/#today">
        <i data-lucide="calendar"></i>Today
      </a>
      <a href="/stories/" {% if request.path == '/stories/' %}class="active" aria-current="page"{% endif %}>
        <i data-lucide="menu"></i>Menu
      </a>
    {% endif %}
  </nav>
</div>
