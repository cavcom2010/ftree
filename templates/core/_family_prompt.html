<section id="prompt">
    <div class="section-head">
        <div>
            <h2>Family Prompt</h2>
            <p>Turns quiet relatives into contributors.</p>
        </div>
    </div>
    <div hx-get="/prompts/current/" hx-trigger="load" hx-swap="innerHTML">
        <div class="prompt-card">
            <div class="mini">TODAY’S QUESTION</div>
            <h3>Loading today’s question...</h3>
            <div class="prompt-actions">
                <button class="btn primary">Answer</button>
                <button class="btn">Share</button>
            </div>
        </div>
    </div>
</section>
