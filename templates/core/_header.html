<!-- templates/core/_header.html -->
<header class="sticky-header">
  <div class="brand-mark">
    <i data-lucide="tree-deciduous"></i>
  </div>
  <div class="brand-text">
    <strong>HeritageTree</strong>
    {% if family %}
      <span>{{ family.name }}{% if generation_count %} • {{ generation_count }} generations{% endif %}</span>
    {% else %}
      <span>Your family tree, but alive.</span>
    {% endif %}
  </div>

  {% if request.user.is_authenticated %}
    <a class="icon-btn" href="/tree/" aria-label="Search tree">
      <i data-lucide="search"></i>
    </a>
    <a class="icon-btn" href="/tree/" aria-label="Create family entry">
      <i data-lucide="plus"></i>
    </a>
    <form method="post" action="{% url 'logout' %}">
      {% csrf_token %}
      <button class="icon-btn" type="submit" aria-label="Log out">
        <i data-lucide="log-out"></i>
      </button>
    </form>
  {% else %}
    <a
      class="icon-btn"
      href="{% url 'login' %}"
      aria-label="Account">
      <i data-lucide="circle-user-round"></i>
    </a>
  {% endif %}
</header>
