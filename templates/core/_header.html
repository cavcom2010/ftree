<!-- templates/core/_header.html -->
<header class="sticky-header">
  <div class="brand-mark">
    <i data-lucide="tree-deciduous"></i>
  </div>
  <div class="brand-text">
    <strong>HeritageTree</strong>
    {% if family %}
      <span>{{ family.name }}{% if generation_count %} • {{ generation_count }} generations{% endif %}</span>
    {% else %}
      <span>Your family tree, but alive.</span>
    {% endif %}
  </div>
  <button class="icon-btn" aria-label="Search" data-tree-search-trigger>
    <i data-lucide="search"></i>
  </button>
  <button class="icon-btn" aria-label="Create" data-create-sheet-trigger>
    <i data-lucide="plus"></i>
  </button>
</header>
