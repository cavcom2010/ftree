<!-- templates/core/_header.html -->
<header class="sticky-header">
  <div class="brand-mark">
    <i data-lucide="tree-deciduous"></i>
  </div>
  <div class="brand-text">
    <strong>HeritageTree</strong>
    {% if family %}
      <span>{{ family.name }}{% if generation_count %} • {{ generation_count }} generations{% endif %}</span>
    {% else %}
      <span>Your family tree, but alive.</span>
    {% endif %}
  </div>

  {% if request.user.is_authenticated %}
    <button class="icon-btn" aria-label="Search" data-tree-search-trigger>
      <i data-lucide="search"></i>
    </button>
    <button class="icon-btn" aria-label="Create" data-create-sheet-trigger>
      <i data-lucide="plus"></i>
    </button>
    <form method="post" action="{% url 'logout' %}">
      {% csrf_token %}
      <button class="icon-btn" type="submit" aria-label="Log out">
        <i data-lucide="log-out"></i>
      </button>
    </form>
  {% else %}
    <a class="icon-btn" href="{% url 'login' %}" aria-label="Log in">
      <i data-lucide="log-in"></i>
    </a>
    <a class="icon-btn" href="{% url 'signup' %}" aria-label="Create account">
      <i data-lucide="user-plus"></i>
    </a>
  {% endif %}
</header>
