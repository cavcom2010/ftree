<section class="hero">
    <h1 class="hero-title">Your family tree,<br>but alive.</h1>
    <p class="hero-desc">Trace your roots, share stories, and keep your family&rsquo;s legacy growing with every generation.</p>
    <div class="hero-actions">
        <a href="#" class="btn btn-primary">🌳 Explore Tree</a>
        <a href="#" class="btn btn-secondary">🔗 Find Relationship</a>
    </div>
    <div class="hero-stats">
        <div class="stat">
            <span class="stat-value">{{ people_count }}</span>
            <span class="stat-label">People</span>
        </div>
        <div class="stat">
            <span class="stat-value">{{ generation_count }}</span>
            <span class="stat-label">Generations</span>
        </div>
        <div class="stat">
            <span class="stat-value">{{ photo_count }}</span>
            <span class="stat-label">Photos</span>
        </div>
        <div class="stat">
            <span class="stat-value">{{ story_count }}</span>
            <span class="stat-label">Stories</span>
        </div>
    </div>
</section>
