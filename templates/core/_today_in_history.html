<div class="section-head animate-in delay-1" id="today">
  <div>
    <h2>Today in Family History</h2>
    <p>Small reasons to return every day.</p>
  </div>
  <a class="link-btn" href="{% if request.user.is_authenticated %}/tree/{% else %}/accounts/signup/{% endif %}">
    View all <i data-lucide="chevron-right"></i>
  </a>
</div>
<div class="today-grid animate-in delay-1">
  {% for card in today_cards %}
    <a class="today-card" href="{{ card.href|default:'/tree/' }}">
        <div class="today-icon">
          <i data-lucide="{{ card.icon|default:'sparkles' }}"></i>
        </div>
        <div>
          <strong>{{ card.title }}</strong>
          <span>{{ card.subtitle }}</span>
        </div>
        <div class="arrow">
          <i data-lucide="chevron-right"></i>
        </div>
    </a>
  {% empty %}
    <a class="today-card" href="/tree/">
      <div class="today-icon">
        <i data-lucide="calendar-plus"></i>
      </div>
      <div>
        <strong>No family dates yet</strong>
        <span>Add birthdays, places, and memories from the tree page.</span>
      </div>
      <div class="arrow">
        <i data-lucide="chevron-right"></i>
      </div>
    </a>
  {% endfor %}
</div>
