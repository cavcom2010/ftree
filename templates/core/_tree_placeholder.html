<section class="section tree-section" id="tree-preview">
    <h2 class="section-title">Family Tree</h2>
    <div class="tree-card">
        <div class="generation-row">
            <span class="gen-label">Gen 1</span>
            <div class="person-node male">Founder A</div>
            <span class="connector">+</span>
            <div class="person-node female">Founder B</div>
        </div>
        <div class="generation-row">
            <span class="gen-label">Gen 2</span>
            <div class="person-node male">Child A</div>
            <div class="person-node female">Child B</div>
            <div class="person-node male">Child C</div>
        </div>
        <div class="generation-row">
            <span class="gen-label">Gen 3</span>
            <div class="person-node female">Grandchild A</div>
            <div class="person-node male">Grandchild B</div>
            <div class="person-node female">Grandchild C</div>
        </div>
        <div class="generation-row">
            <span class="gen-label">Gen 4</span>
            <div class="person-node female">Descendant A</div>
            <div class="person-node male">Descendant B</div>
        </div>
    </div>
    <a href="#" class="btn btn-outline btn-block">Open Full Tree</a>
</section>
