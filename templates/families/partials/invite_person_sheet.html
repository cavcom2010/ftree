<section class="tree-create-sheet is-open" id="tree-create-sheet" aria-labelledby="tree-create-title" aria-hidden="false">
  <div class="tree-create-handle"></div>
  <div class="tree-create-head">
    <div>
      <p class="tree-eyebrow">Connect user</p>
      <h2 id="tree-create-title">{{ title }}</h2>
    </div>
    <button type="button" data-create-sheet-close aria-label="Close create menu">&times;</button>
  </div>
  <form class="tree-invite-form" method="post" hx-post="{% url 'family_invite_person' person.id %}" hx-target="#tree-create-sheet" hx-swap="outerHTML">
    {% csrf_token %}
    {% if form.non_field_errors %}
      <div class="tree-form-errors">{{ form.non_field_errors }}</div>
    {% endif %}
    <label>
      <span>{{ form.invitee.label }}</span>
      {{ form.invitee }}
      {{ form.invitee.errors }}
    </label>
    <label>
      <span>{{ form.role.label }}</span>
      {{ form.role }}
      {{ form.role.errors }}
    </label>
    <label>
      <span>{{ form.message.label }}</span>
      {{ form.message }}
      {{ form.message.errors }}
    </label>
    <div class="tree-create-actions">
      <button type="submit">{{ submit_label }}</button>
      <button type="button" data-create-sheet-close>Cancel</button>
    </div>
  </form>
</section>
<div class="tree-sheet-backdrop" id="tree-sheet-backdrop" data-create-sheet-close hx-swap-oob="true"></div>
