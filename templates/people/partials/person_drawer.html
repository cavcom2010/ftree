<div class="drawer-handle"></div>
<div class="drawer-main">
    <div class="drawer-avatar">{{ person.first_name|slice:":1" }}</div>
    <div>
        <b>{{ person.full_name }}</b>
        <span>
            {% if person.birth_date %}{{ person.birth_date|date:'Y' }}{% endif %}
            {% if person.death_date %} – {{ person.death_date|date:'Y' }}{% endif %}
            {% if generation_label %} · {{ generation_label }}{% endif %}
        </span>
    </div>
    <button class="drawer-close" onclick="closeDrawer()" aria-label="Close">×</button>
</div>
<div class="drawer-actions">
    <button class="btn primary">View Profile</button>
    <button class="btn"
            hx-get="/people/{{ person.id }}/add-relative/child/"
            hx-target="#personDrawer"
            hx-swap="innerHTML">Add Relative</button>
    <button class="btn">Timeline</button>
    <button class="btn soft" onclick="revealAll()">Reveal Branch</button>
</div>
