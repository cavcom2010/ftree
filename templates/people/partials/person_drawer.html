<!-- templates/people/partials/person_drawer.html -->
<div class="drawer-handle"></div>
<div class="drawer-main">
  <div class="drawer-avatar" id="drawerAvatar">
    {% if person.profile_photo %}
      <img src="{{ person.profile_photo.url }}" alt="{{ person.full_name }}">
    {% else %}
      {{ person.initials }}
    {% endif %}
  </div>
  <div>
    <b id="drawerName">{{ person.full_name }}</b>
    <span id="drawerMeta">{{ generation_label|default:"Family Member" }}</span>
  </div>
  <button class="drawer-close" onclick="closeDrawer()" aria-label="Close">
    <i data-lucide="x"></i>
  </button>
</div>
<div class="drawer-actions">
  <a href="{% url 'tree' %}" class="btn primary">
    <i data-lucide="tree-deciduous"></i>Open Tree
  </a>
  {% if can_edit_name %}
    <button class="btn soft" type="button" hx-get="{% url 'person_edit_name' person.id %}" hx-target="#global-sheet" hx-swap="innerHTML">
      <i data-lucide="pencil"></i>Edit Name
    </button>
  {% else %}
    <a href="{% url 'tree' %}" class="btn soft">
      <i data-lucide="user-plus"></i>Add Relative
    </a>
  {% endif %}
</div>
