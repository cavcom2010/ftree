<section class="tree-create-sheet is-open" id="tree-create-sheet" aria-labelledby="tree-create-title" aria-hidden="false">
  <div class="tree-create-handle"></div>
  <div class="tree-create-head">
    <div>
      <p class="tree-eyebrow">Edit profile</p>
      <h2 id="tree-create-title">{{ person.full_name }}</h2>
    </div>
    <button type="button" data-create-sheet-close aria-label="Close edit form">&times;</button>
  </div>

  <form class="tree-invite-form" method="post" enctype="multipart/form-data" hx-post="{% url 'person_edit' person.id %}" hx-target="#tree-create-sheet" hx-swap="outerHTML" hx-encoding="multipart/form-data">
    {% csrf_token %}
    {% if form.non_field_errors %}
      <div class="tree-form-errors">{{ form.non_field_errors }}</div>
    {% endif %}

    <div class="tree-form-section">
      <label class="tree-photo-upload">
        <span class="tree-photo-label">Profile photo</span>
        <div class="tree-photo-preview {% if person.profile_photo %}has-photo{% endif %}" id="profile-photo-preview">
          {% if person.profile_photo %}
            <img src="{{ person.profile_photo.url }}" alt="{{ person.full_name }}">
          {% else %}
            <span class="tree-photo-placeholder">{{ person.first_name|slice:":1" }}{{ person.last_name|slice:":1" }}</span>
          {% endif %}
        </div>
        {{ form.profile_photo }}
        {% if form.profile_photo.errors %}<span class="tree-field-error">{{ form.profile_photo.errors }}</span>{% endif %}
      </label>
    </div>

    <div class="tree-form-grid">
      <label>
        <span>{{ form.first_name.label }}</span>
        {{ form.first_name }}
        {{ form.first_name.errors }}
      </label>
      <label>
        <span>{{ form.last_name.label }}</span>
        {{ form.last_name }}
        {{ form.last_name.errors }}
      </label>
    </div>

    <div class="tree-form-grid">
      <label>
        <span>{{ form.middle_name.label }}</span>
        {{ form.middle_name }}
        {{ form.middle_name.errors }}
      </label>
      <label>
        <span>{{ form.maiden_name.label }}</span>
        {{ form.maiden_name }}
        {{ form.maiden_name.errors }}
      </label>
    </div>

    <div class="tree-form-grid">
      <label>
        <span>{{ form.gender.label }}</span>
        {{ form.gender }}
        {{ form.gender.errors }}
      </label>
      <label>
        <span>{{ form.is_living.label }}</span>
        {{ form.is_living }}
        {{ form.is_living.errors }}
      </label>
    </div>

    <div class="tree-form-grid">
      <label>
        <span>{{ form.birth_date.label }}</span>
        {{ form.birth_date }}
        {{ form.birth_date.errors }}
      </label>
      <label>
        <span>{{ form.death_date.label }}</span>
        {{ form.death_date }}
        {{ form.death_date.errors }}
      </label>
    </div>

    <div class="tree-form-grid">
      <label>
        <span>{{ form.birth_place.label }}</span>
        {{ form.birth_place }}
        {{ form.birth_place.errors }}
      </label>
      <label>
        <span>{{ form.current_place.label }}</span>
        {{ form.current_place }}
        {{ form.current_place.errors }}
      </label>
    </div>

    <label>
      <span>{{ form.biography.label }}</span>
      {{ form.biography }}
      {{ form.biography.errors }}
    </label>

    <label>
      <span>{{ form.visibility.label }}</span>
      {{ form.visibility }}
      {% if form.visibility.errors %}<span class="tree-field-error">{{ form.visibility.errors }}</span>{% endif %}
      <span class="tree-form-help">{{ form.visibility.help_text }}</span>
    </label>

    <label>
      <span>{{ form.public_notes.label }}</span>
      {{ form.public_notes }}
      {% if form.public_notes.errors %}<span class="tree-field-error">{{ form.public_notes.errors }}</span>{% endif %}
      <span class="tree-form-help">{{ form.public_notes.help_text }}</span>
    </label>

    <label>
      <span>{{ form.is_private.label }}</span>
      {{ form.is_private }}
      {{ form.is_private.errors }}
    </label>

    <div class="tree-create-actions">
      <button type="submit">Save profile</button>
      <button type="button" data-create-sheet-close>Cancel</button>
    </div>
  </form>
</section>
<div class="tree-sheet-backdrop" id="tree-sheet-backdrop" data-create-sheet-close hx-swap-oob="true"></div>

<script>
  (function() {
    var input = document.querySelector('input[type="file"][name="profile_photo"]');
    var preview = document.getElementById('profile-photo-preview');
    if (!input || !preview) return;
    input.addEventListener('change', function() {
      var file = input.files && input.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        preview.innerHTML = '<img src="' + e.target.result + '" alt="Preview">';
        preview.classList.add('has-photo');
      };
      reader.readAsDataURL(file);
    });
  })();
</script>
