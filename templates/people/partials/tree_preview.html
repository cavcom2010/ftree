<section class="section tree-section" id="tree-preview">
    <h2 class="section-title">Family Tree</h2>
    <div class="tree-snapshot">
        {% for lane in generation_rows %}
            {% include "people/partials/generation_lane.html" with lane=lane %}
        {% endfor %}
    </div>
    <a href="#" class="btn btn-outline btn-block">Open Full Tree</a>
</section>

<div class="person-drawer" id="person-drawer">
    <div class="person-drawer-handle"></div>
    <div class="person-drawer-content">
        <div class="person-drawer-avatar" id="drawer-avatar">?</div>
        <h3 class="person-drawer-name" id="drawer-name"></h3>
        <p class="person-drawer-meta" id="drawer-meta"></p>
        <div class="person-drawer-actions">
            <button class="btn btn-primary btn-sm">View Profile</button>
            <button class="btn btn-ghost btn-sm" onclick="closeDrawer()">Close</button>
        </div>
    </div>
</div>
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
