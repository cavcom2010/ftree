{% extends "base.html" %}
{% block title %}Account email error · HeritageTree{% endblock %}
{% block content %}
<section class="tree-card auth-card animate-in">
  <div class="section-head">
    <div>
      <h2>Account email error</h2>
      <p>{{ reason }}</p>
    </div>
  </div>
  <div class="form-actions">
    <a class="btn primary" href="{% url 'email_verification_resend' %}">Send again</a>
    <a class="btn soft" href="{% url 'home' %}">Home</a>
  </div>
</section>
{% endblock %}
