{% extends "base.html" %}
{% block title %}Check your email · HeritageTree{% endblock %}
{% block content %}
<section class="tree-card auth-card animate-in">
  <div class="section-head">
    <div>
      <h2>Check your email</h2>
      <p>Open the message from HeritageTree to activate your account.</p>
    </div>
  </div>
  <div class="form-actions">
    <a class="btn primary" href="{% url 'email_verification_resend' %}">Send again</a>
    <a class="btn soft" href="{% url 'login' %}">Back to sign in</a>
  </div>
</section>
{% endblock %}
