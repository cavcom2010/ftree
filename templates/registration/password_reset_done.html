{% extends "base.html" %}
{% block title %}Email sent · HeritageTree{% endblock %}
{% block content %}
<section class="tree-card auth-card animate-in">

    <div>
      <h2>Email sent</h2>
      <p>If the address exists, HeritageTree has sent account access instructions.</p>

  </div>
</section>
{% endblock %}
