{% extends "base.html" %}
{% block title %}Account access · HeritageTree{% endblock %}
{% block content %}
<section class="tree-card animate-in">
  <div class="section-head"><div><h2>Account access</h2><p>Enter your email address.</p></div></div>
  <form method="post" class="person-form">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="form-actions"><button class="btn primary" type="submit">Send email</button><a class="btn soft" href="{% url 'login' %}">Back</a></div>
  </form>
</section>
{% endblock %}
