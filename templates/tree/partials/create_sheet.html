<section class="tree-create-sheet" id="tree-create-sheet" aria-labelledby="tree-create-title" aria-hidden="true">
    <div class="tree-create-handle"></div>
    <div class="tree-create-head">
        <div>
            <p class="tree-eyebrow">Create</p>
            <h2 id="tree-create-title">Add to the family tree</h2>
        </div>
        <button type="button" data-create-sheet-close aria-label="Close create menu">&times;</button>
    </div>
    <div class="tree-create-actions">
        {% if tree_only %}
            <button type="button" data-tree-scroll-anchor data-create-sheet-close>Choose a person in the tree</button>
            <button type="button" data-tree-toast="Open a person card, then use Parents, Partners, Children, Siblings, or Details to invite the right relative.">Invite from person card</button>
            <button type="button" data-tree-toast="Pending invites show on person cards until accepted, declined, or ignored.">Review invite status</button>
            <button type="button" data-tree-toast="Accepted invitations connect users through their claimed family-tree person.">Connected users</button>
        {% else %}
            <button type="button" data-tree-toast="Add relative flow will open here.">Add relative</button>
            <button type="button" data-tree-toast="Photo memory flow will open here.">Add photo memory</button>
            <button type="button" data-tree-toast="Story editor will open here.">Write story</button>
            <button type="button" data-tree-toast="Video memory flow will open here.">Add video</button>
        {% endif %}
    </div>
</section>
<div class="tree-sheet-backdrop" id="tree-sheet-backdrop" data-create-sheet-close hidden></div>
